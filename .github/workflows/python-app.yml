name: python CI

on:
   push:
     branches:
           - main

   pull_request:
    branches:
           - main

jobs:
    build:
      
      runs-on: ubuntu-latest

      steps:
      - name: checkout Repository
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with
        python version: '3.10'

      - name: Install Dependencies
        run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

      - name: run Tests
        run:
        pytest